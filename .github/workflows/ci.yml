name: CI

on:
  push:
    branches:
      - "release/*"
      - develop
      - main
  pull_request:
    branches: [ develop, main ]

permissions:
  contents: write
  packages: write

jobs:
  ci:
    uses: mario-noobs/ci-baseline/.github/workflows/_ci-java.yml@main
    with:
      gradle_tasks: "clean test jacocoTestReport jacocoTestCoverageVerification"
      sonar_project_key: mario-noobs_backend-service
      sonar_organization: mario-noobs
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

  docker:
    needs: ci
    if: github.event_name == 'push'
    uses: mario-noobs/ci-baseline/.github/workflows/_docker-build.yml@main
    with:
      image_name: backend-service
      context: "."

  dispatch:
    name: Notify orchestrator
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to face-microservice
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORCHESTRATOR_DISPATCH_TOKEN }}
          repository: mario-noobs/face-microservice
          event-type: service-image-published
          client-payload: |
            {
              "service": "backend-service",
              "tag": "${{ needs.docker.outputs.image_tag }}"
            }
